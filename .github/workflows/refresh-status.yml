name: refresh-status
# GTWS 예약현황 status.json 매일 갱신 (노션 → status.json 커밋)
on:
  schedule:
    - cron: '5 0 * * *'      # 00:05 UTC = 09:05 KST (노션 09:00 갱신 후)
  workflow_dispatch: {}       # 수동 실행 버튼

permissions:
  contents: write             # status.json 커밋용

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build status.json from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node build_status.mjs
      - name: Commit if changed
        run: |
          git config user.name "gtws-bot"
          git config user.email "actions@users.noreply.github.com"
          git add status.json
          if git diff --staged --quiet; then
            echo "변경 없음"
          else
            git commit -m "chore: refresh status.json ($(date -u +%FT%TZ))"
            git push
          fi
