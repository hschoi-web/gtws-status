<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
<title>2026 GTWS 셔틀 예약현황 / Shuttle Reservation Status</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

  :root{
    --bg:#ffffff;
    --panel:#ffffff;
    --ink:#1a1d24;
    --muted:#8b909a;
    --line:#eceef1;
    --ink-2:#5a5f6a;
    --accent:#0068c8;
    --accent-2:#4d9fe8;
    --track:#f0f1f4;
    --full:#00a35c;
    --danger:#ff3b30;
    --radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
    line-height:1.5;-webkit-font-smoothing:antialiased;word-break:keep-all;
  }
  .wrap{max-width:1100px;margin:0 auto;padding:clamp(1rem,3vw,2rem)}

  header{margin-bottom:1.1rem}
  .brandrow{display:flex;align-items:center;justify-content:space-between}
  .brandline{font-size:.68rem;letter-spacing:.2em;color:var(--accent);font-weight:800;text-transform:uppercase}
  .langtoggle{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;flex-shrink:0}
  .langtoggle button{padding:.3rem .8rem;border:none;background:#fff;font-family:inherit;font-size:.72rem;
    font-weight:800;color:var(--muted);cursor:pointer;letter-spacing:.03em}
  .langtoggle button.active{background:var(--ink);color:#fff}
  h1{font-size:clamp(1.35rem,4vw,1.85rem);font-weight:800;letter-spacing:-.02em;margin-top:.3rem}
  .sub{font-size:1.15rem;font-weight:bold;color:var(--danger);margin-top:.45rem}
  .updated{font-size:.74rem;color:var(--muted);margin-top:.75rem;display:flex;align-items:center;gap:.4rem}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block}
  .updated b{color:var(--ink);font-weight:600}

  .controls{display:flex;flex-wrap:wrap;gap:.75rem;align-items:center;justify-content:space-between;
            margin:1.1rem 0 1.2rem;padding-bottom:1.1rem;border-bottom:1px solid var(--line)}
  .dates{display:flex;gap:.35rem}
  .dates button{padding:.5rem .9rem;border:1px solid var(--line);background:#fff;border-radius:9px;
    font-family:inherit;font-size:.83rem;font-weight:700;color:var(--muted);cursor:pointer;transition:.15s}
  .dates button.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .dir-tabs{display:flex;gap:.35rem}
  .dir-tabs button{padding:.5rem .9rem;border:none;background:transparent;border-bottom:2px solid var(--line);
    font-family:inherit;font-size:.85rem;font-weight:700;color:var(--muted);cursor:pointer;transition:.15s}
  .dir-tabs button.active{color:var(--ink);border-bottom-color:var(--accent)}
  .dir-tabs button.unavailable{opacity:.4}
  .dir-tabs button.unavailable:not(.active){color:var(--muted)}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:.7rem}
  .route{border:1px solid var(--line);border-radius:var(--radius);padding:.9rem 1rem;background:#fff}
  .route-name{font-weight:700;font-size:.98rem;display:flex;align-items:baseline;gap:.4rem}
  .route-name .avg{margin-left:auto;font-size:.8rem;font-weight:700;color:var(--muted)}
  .route-path{font-size:.7rem;color:var(--muted);margin-top:.15rem;line-height:1.35}

  .runs{margin-top:.7rem;display:flex;flex-direction:column;gap:.5rem}
  .run{display:flex;align-items:center;gap:.65rem}
  .run .dep{font-size:.9rem;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:.02em;width:3rem;flex-shrink:0}
  .run .bar{flex:1;height:7px;border-radius:99px;background:var(--track);overflow:hidden}
  .run .bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent-2))}
  .run .pv{font-size:.82rem;font-weight:800;font-variant-numeric:tabular-nums;width:3.6rem;text-align:right;flex-shrink:0;color:var(--ink-2)}
  .run.full .bar i{background:linear-gradient(90deg,var(--full),#5fb488)}
  .run.full .pv{color:var(--full)}
  .run.zero .pv{color:var(--muted)}

  .note{border:1px solid var(--line);border-radius:12px;padding:.85rem 1rem;font-size:.76rem;color:var(--muted);margin-top:1.3rem;line-height:1.6;background:#fafbfc}
  .note b{color:var(--ink)}
  footer{margin-top:1.3rem;padding-top:1.1rem;border-top:1px solid var(--line);color:var(--muted);font-size:.75rem;line-height:1.7}
  footer a{color:var(--accent);text-decoration:none}
  @media(max-width:520px){.grid{grid-template-columns:1fr}.controls{flex-direction:column;align-items:stretch}.dates,.dir-tabs{justify-content:center}}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brandrow">

  <div class="grid" id="routeList"></div>

  <div class="note" id="noteBox"></div>
  <footer id="footerBox"></footer>
</div>

let LANG = 'ko';
let curDate = Object.keys(DATA.ko)[0], curDir = '행사장행';
let lastUpdatedTs = null;

const rateOf = b => Math.min(100, (b/MIN)*100);
const fmtRate = r => r.toFixed(2);
const avgOf = info => info.runs.length ? (info.runs.reduce((a,r)=>a+rateOf(r.booked),0)/info.runs.length) : 0;

function applyStaticText(){
  const s = STR[LANG];
  document.documentElement.lang = LANG;
  document.getElementById('h1Title').textContent = s.title;
  document.getElementById('subText').textContent = s.sub;
  document.getElementById('updLabel').textContent = s.updLabel;
  document.getElementById('updNote').textContent = s.updNote;
  document.getElementById('noteBox').innerHTML = s.note;
  document.getElementById('footerBox').innerHTML = s.footer;
  document.querySelectorAll('#langToggle button').forEach(b=>b.classList.toggle('active', b.dataset.lang===LANG));
  updTimestamp();
}

function updTimestamp(){
  const s = STR[LANG];
  const d = lastUpdatedTs ? new Date(lastUpdatedTs) : new Date();
  document.getElementById('upd').textContent = d.toLocaleString(s.locale,{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) + (lastUpdatedTs ? s.updSuffix : '');
}

function currentData(){ return DATA[LANG]; }

function renderDates(){
  const el=document.getElementById('dates'); el.innerHTML='';
  const data = currentData();
  const dates=Object.keys(data);
  if(!curDate || !data[curDate]) curDate=dates[0];
  const s = STR[LANG];
  dates.forEach(d=>{
    const b=document.createElement('button');
    b.textContent=s.dateLbl[d]||d; b.className=d===curDate?'active':'';
    b.onclick=()=>{curDate=d; ensureDir(); renderAll();};
    el.appendChild(b);
  });
}
function ensureDir(){
  const data = currentData();
  if(!curDate || !data[curDate]) curDate = Object.keys(data)[0];
  if(!(data[curDate]||{})[curDir]) curDir = Object.keys(data[curDate])[0];
}
function dirIsAvailable(data, date, dir){
  const v = (data[date]||{})[dir];
  return !!v && Object.keys(v).length > 0;
}
function availableDirs(data, date){
  return DIRS.filter(dir => dirIsAvailable(data, date, dir));
}

function renderDirTabs(){
  const el=document.getElementById('dirTabs'); el.innerHTML='';
  const data = currentData();
  const avail=availableDirs(data, curDate);
  const s = STR[LANG];
  DIRS.forEach(dir=>{
    const b=document.createElement('button');
    b.textContent=s.dirLbl[dir];
    const isAvail = avail.includes(dir);
    b.className=(dir===curDir?'active':'') + (isAvail?'':' unavailable');
    b.onclick=()=>{curDir=dir; renderRoutes(); renderDirTabs(); renderDayNotice();};
    el.appendChild(b);
  });
}

function renderRoutes(){
  const el=document.getElementById('routeList'); el.innerHTML='';
  const data = currentData();
  const rd=(data[curDate]||{})[curDir]||{};
  const s = STR[LANG];
  const sortedNames = Object.keys(rd).sort((a,b)=>a.localeCompare(b, LANG==='ko'?'ko':'en'));
  for(const rt of sortedNames){
    const info=rd[rt];
    const path=(info.stops||'').split('+').join(' · ');
    const card=document.createElement('div'); card.className='route';
    let runsHtml='';
    info.runs.forEach(r=>{
      const rate=rateOf(r.booked);
      const cls=rate>=100?'full':(rate===0?'zero':'');
      runsHtml+=`<div class="run ${cls}">
        <span class="dep">${r.dep}</span>
        <span class="bar"><i style="width:${rate}%"></i></span>
        <span class="pv">${fmtRate(rate)}%</span>
      </div>`;
    });
    card.innerHTML=`
      <div class="route-name">${rt}${s.routeSuffix}<span class="avg">${s.avgLabel}${fmtRate(avgOf(info))}%</span></div>
      <div class="route-path">${path}</div>
      <div class="runs">${runsHtml}</div>`;
    el.appendChild(card);
  }
}

function renderDayNotice(){
  const s = STR[LANG];
  const el = document.getElementById('dayNotice');
  const data = currentData();
  const avail = availableDirs(data, curDate);
  const msg = (!avail.includes(curDir)) ? (s.noDirNotice && s.noDirNotice[curDate]) : null;
  if (msg){ el.textContent = msg; el.style.display = ''; }
  else { el.style.display = 'none'; el.textContent = ''; }
}

function renderAll(){ applyStaticText(); renderDates(); renderDirTabs(); renderDayNotice(); renderRoutes(); }

document.getElementById('langToggle').addEventListener('click', e=>{
  const btn = e.target.closest('button'); if(!btn) return;
  if(btn.dataset.lang === LANG) return;
  LANG = btn.dataset.lang;
  ensureDir(); renderAll();  // curDate/curDir 유지 (날짜·방향 키는 언어 공통)
});

ensureDir(); renderAll();

/* 실운영 연결 (GitHub Pages 동일 origin): status.json(ko) + status-en.json(en) 둘 다 로드 */
async function loadLive(){
  try{
    const [resKo, resEn] = await Promise.all([
      fetch('./status.json',{cache:'no-store'}),
      fetch('./status-en.json',{cache:'no-store'})
    ]);
    const liveKo = await resKo.json();
    const liveEn = await resEn.json();
    Object.keys(DATA.ko).forEach(k=>delete DATA.ko[k]);
    Object.keys(DATA.en).forEach(k=>delete DATA.en[k]);
    Object.assign(DATA.ko, liveKo.days || liveKo);
    Object.assign(DATA.en, liveEn.days || liveEn);
    lastUpdatedTs = liveKo.updated || Date.now();
    curDate = null; ensureDir(); renderAll();
  }catch(e){ console.warn('status fetch 실패, 내장 데이터 사용', e); }
}
loadLive();
// setInterval(loadLive, 10*60*1000);  // 주기 단축 시 이 값 조정
</script>
